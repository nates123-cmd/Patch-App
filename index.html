<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f4f4ee" media="(prefers-color-scheme: light)" />
<link rel="manifest" href="./manifest.json" />
<title>Patch</title>
<style>
  :root {
    --bg: #18181b;
    --bg-elevated: #232327;
    --bg-nested: #2e2e32;
    --border: #2e2e32;
    --border-strong: #38383d;
    --text: #e8e8e6;
    --text-muted: #b4b2a9;
    --text-faint: #888782;
    --text-fainter: #5f5e5a;
    --accent: #f5d547;
    --accent-hover: #ffe066;
    --danger: #e57373;

    --tick: #a39cf0;
    --break: #e8d4a8;
    --tide: #85b7eb;
    --still: #b4c89a;
    --course: #d4995a;
    --patch: #f5d547;
    --stock: #5fbfae;
    --ink: #8b9ae0;
    --today: #eaa18a;
    --crate: #df8a8a;
    --cue: #c98ad4;

    --layout-width: 440px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f4ee;
      --bg-elevated: #ebebe2;
      --bg-nested: #dedccf;
      --border: #d4d2c4;
      --border-strong: #b8b6a8;
      --text: #1a1a1c;
      --text-muted: #4a4a48;
      --text-faint: #6e6c66;
      --text-fainter: #8e8c84;
      --accent: #c4a020;
      --accent-hover: #a88a10;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    overflow-x: hidden;
    overscroll-behavior-x: none;
    touch-action: pan-y;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  body {
    max-width: var(--layout-width);
    margin: 0 auto;
    padding: 22px 18px 100px;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* Re-enable text selection on form fields + the user's own typed content. */
  input, textarea, select, [contenteditable],
  .field-input, .fix-text, .fix-sub {
    -webkit-user-select: text;
    user-select: text;
  }

  button { font-family: inherit; cursor: pointer; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }
  .title { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
  .util { display: flex; gap: 14px; }
  .util-link {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 13px;
    padding: 4px 2px;
    cursor: pointer;
  }
  .util-link:hover, .util-link:focus-visible { color: var(--text-muted); outline: none; }

  /* Capture block */
  .capture {
    background: var(--bg-elevated);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 22px;
  }

  /* Type picker (three large cards) */
  .type-picker { display: flex; flex-direction: column; gap: 10px; }
  .type-card {
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-align: left;
    background: var(--bg-nested);
    border: 0.5px solid var(--border-strong);
    border-radius: 12px;
    padding: 16px 16px;
    color: var(--text);
    transition: background 0.12s, border-color 0.12s, transform 0.05s;
  }
  .type-card:hover { background: var(--border-strong); }
  .type-card:active { transform: scale(0.99); }
  .type-card .tc-name { font-size: 16px; font-weight: 600; }
  .type-card.bug .tc-name { color: var(--accent); }
  .type-card.feature .tc-name { color: var(--tide); }
  .type-card.idea .tc-name { color: var(--tick); }
  .type-card .tc-desc { font-size: 12px; color: var(--text-faint); }

  /* Freeform capture */
  .freeform-entry {
    display: flex;
    flex-direction: column;
    gap: 3px;
    text-align: left;
    width: 100%;
    background: var(--bg-nested);
    border: 0.5px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    transition: background 0.12s, transform 0.05s;
  }
  .freeform-entry:hover { background: var(--border-strong); }
  .freeform-entry:active { transform: scale(0.99); }
  .ff-entry-name { font-size: 16px; font-weight: 600; color: var(--accent); }
  .ff-entry-desc { font-size: 12px; color: var(--text-faint); }
  .picker-or {
    text-align: center;
    font-size: 11px;
    color: var(--text-fainter);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 12px 0;
  }
  textarea.ff-text { min-height: 110px; line-height: 1.4; }
  .ff-actions { display: flex; gap: 8px; margin-top: 12px; }
  .mic-btn {
    flex: 0 0 auto;
    background: var(--bg-nested);
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    padding: 0 14px;
  }
  .mic-btn:hover { border-color: var(--text-faint); }
  .mic-btn.on { background: var(--danger); border-color: var(--danger); color: #1a1a1c; }
  .ff-format { flex: 1 1 auto; }
  .draft-banner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(245, 213, 71, 0.1);
    border: 0.5px solid rgba(245, 213, 71, 0.35);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 14px;
  }
  .draft-back {
    flex: 0 0 auto;
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    padding: 2px;
  }

  /* Form */
  .form-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .form-title { font-size: 14px; font-weight: 600; }
  .form-title.bug { color: var(--accent); }
  .form-title.feature { color: var(--tide); }
  .form-title.idea { color: var(--tick); }
  .change-type {
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 12px;
    padding: 2px;
  }
  .change-type:hover { color: var(--text-muted); }
  .form-note { font-size: 12px; color: var(--text-faint); margin-bottom: 12px; padding-left: 2px; }

  .field { margin-bottom: 12px; }
  .field-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-faint);
    margin-bottom: 6px;
    padding-left: 2px;
  }
  .field-label.required::after {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 6px;
    vertical-align: 0.12em;
  }
  .field-input {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    padding: 11px 12px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    line-height: 1.4;
    resize: vertical;
  }
  textarea.field-input { min-height: 46px; }
  .field-input::placeholder { color: var(--text-fainter); }
  .field-input:focus { outline: none; border-color: var(--accent); }

  .pills-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg-nested);
    color: var(--text-muted);
    border: 0.5px solid var(--border-strong);
    cursor: pointer;
    transition: background 0.12s, transform 0.05s;
  }
  .pill:active { transform: scale(0.96); }
  .pill:hover { background: var(--border-strong); }
  .pill.tick { color: var(--tick); }
  .pill.break { color: var(--break); }
  .pill.tide { color: var(--tide); }
  .pill.course { color: var(--course); }
  .pill.patch { color: var(--patch); }
  .pill.stock { color: var(--stock); }
  .pill.ink { color: var(--ink); }
  .pill.today { color: var(--today); }
  .pill.crate { color: var(--crate); }
  .pill.cue { color: var(--cue); }
  .pill.all { color: var(--text-muted); }
  .pill.selected.tick { background: var(--tick); color: #1a1a1c; border-color: var(--tick); }
  .pill.selected.break { background: var(--break); color: #1a1a1c; border-color: var(--break); }
  .pill.selected.tide { background: var(--tide); color: #1a1a1c; border-color: var(--tide); }
  .pill.selected.course { background: var(--course); color: #1a1a1c; border-color: var(--course); }
  .pill.selected.patch { background: var(--patch); color: #1a1a1c; border-color: var(--patch); }
  .pill.selected.stock { background: var(--stock); color: #1a1a1c; border-color: var(--stock); }
  .pill.selected.ink { background: var(--ink); color: #1a1a1c; border-color: var(--ink); }
  .pill.selected.today { background: var(--today); color: #1a1a1c; border-color: var(--today); }
  .pill.selected.crate { background: var(--crate); color: #1a1a1c; border-color: var(--crate); }
  .pill.selected.cue { background: var(--cue); color: #1a1a1c; border-color: var(--cue); }
  .pill.selected.all { background: var(--text-muted); color: var(--bg); border-color: var(--text-muted); }

  /* Severity pills */
  .sev-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 999px;
    background: var(--bg-nested);
    color: var(--text-muted);
    border: 0.5px solid var(--border-strong);
    cursor: pointer;
    transition: background 0.12s, transform 0.05s;
  }
  .sev-pill:active { transform: scale(0.96); }
  .sev-pill:hover { background: var(--border-strong); }
  .sev-pill.on.blocker { background: var(--danger); color: #1a1a1c; border-color: var(--danger); }
  .sev-pill.on.annoying { background: var(--accent); color: #1a1a1c; border-color: var(--accent); }
  .sev-pill.on.polish { background: var(--text-faint); color: var(--bg); border-color: var(--text-faint); }

  .save-row { display: flex; justify-content: flex-end; margin-top: 14px; }
  .save-btn {
    background: var(--accent);
    color: #1a1a1c;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.12s, opacity 0.12s;
  }
  .save-btn:hover { background: var(--accent-hover); }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Section label */
  .section-label {
    font-size: 10px;
    color: var(--text-fainter);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* Queue tabs */
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 8px;
    color: var(--text-faint);
    font-size: 12px;
    font-weight: 600;
  }
  .tab:hover { color: var(--text-muted); }
  .tab.on { background: var(--bg-nested); border-color: var(--border-strong); color: var(--text); }
  .tab.on.bug { color: var(--accent); }
  .tab.on.feature { color: var(--tide); }
  .tab.on.idea { color: var(--tick); }
  .tab-count { font-size: 11px; font-weight: 500; color: var(--text-fainter); }
  .tab.on .tab-count { color: var(--text-faint); }

  /* Item card */
  .fix-list { display: flex; flex-direction: column; gap: 8px; }
  .fix {
    background: var(--bg-elevated);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .fix:hover { background: var(--bg-nested); }
  .fix.editing { background: var(--bg-nested); border-color: var(--border-strong); cursor: default; }

  .fix-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .fix-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex-wrap: wrap; }
  .app-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg-nested);
    text-transform: capitalize;
  }
  .app-tag.tick { color: var(--tick); }
  .app-tag.break { color: var(--break); }
  .app-tag.tide { color: var(--tide); }
  .app-tag.course { color: var(--course); }
  .app-tag.patch { color: var(--patch); }
  .app-tag.stock { color: var(--stock); }
  .app-tag.ink { color: var(--ink); }
  .app-tag.today { color: var(--today); }
  .app-tag.crate { color: var(--crate); }
  .app-tag.cue { color: var(--cue); }
  .app-tag.all { color: var(--text-muted); }

  .type-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg-nested);
  }
  .type-tag.feature { color: var(--tide); }
  .type-tag.idea { color: var(--tick); }

  .sev-chip {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .sev-chip.blocker { background: rgba(229, 115, 115, 0.18); color: var(--danger); }
  .sev-chip.annoying { background: rgba(245, 213, 71, 0.15); color: var(--accent); }
  .sev-chip.polish { background: rgba(136, 135, 130, 0.2); color: var(--text-faint); }

  .status-chip {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    border: none;
    background: transparent;
    white-space: nowrap;
  }
  .status-chip.open { background: rgba(245, 213, 71, 0.15); color: var(--accent); }
  .status-chip.in_progress { background: rgba(133, 183, 235, 0.15); color: var(--tide); }
  .status-chip.fixed { background: rgba(180, 200, 154, 0.15); color: var(--still); }
  .status-chip.shipped { background: rgba(95, 191, 174, 0.15); color: var(--stock); }
  .status-chip.parked { background: rgba(95, 94, 90, 0.25); color: var(--text-faint); }
  .status-chip.needs_info { background: rgba(163, 156, 240, 0.15); color: var(--tick); }

  .fix-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 4px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    font-weight: 500;
  }
  .fix-text.parked { color: var(--text-fainter); }
  .fix-sub {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 6px;
    overflow-wrap: anywhere;
  }
  .fix-ts { font-size: 11px; color: var(--text-fainter); }

  /* Editing state */
  .fix-edit-status { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .status-pick {
    font-size: 10px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 999px;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    color: var(--text-faint);
    cursor: pointer;
  }
  .status-pick:hover { color: var(--text); }
  .status-pick.on.open { background: rgba(245, 213, 71, 0.2); color: var(--accent); border-color: var(--accent); }
  .status-pick.on.in_progress { background: rgba(133, 183, 235, 0.2); color: var(--tide); border-color: var(--tide); }
  .status-pick.on.fixed { background: rgba(180, 200, 154, 0.2); color: var(--still); border-color: var(--still); }
  .status-pick.on.shipped { background: rgba(95, 191, 174, 0.2); color: var(--stock); border-color: var(--stock); }
  .status-pick.on.parked { background: rgba(95, 94, 90, 0.3); color: var(--text-muted); border-color: var(--border-strong); }
  .status-pick.on.needs_info { background: rgba(163, 156, 240, 0.2); color: var(--tick); border-color: var(--tick); }

  .type-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--bg-nested);
    color: var(--text-muted);
    border: 0.5px solid var(--border-strong);
    cursor: pointer;
    transition: background 0.12s, transform 0.05s;
  }
  .type-pill:active { transform: scale(0.96); }
  .type-pill:hover { background: var(--border-strong); }
  .type-pill.on.bug { background: var(--accent); color: #1a1a1c; border-color: var(--accent); }
  .type-pill.on.feature { background: var(--tide); color: #1a1a1c; border-color: var(--tide); }
  .type-pill.on.idea { background: var(--tick); color: #1a1a1c; border-color: var(--tick); }

  .fix-edit-actions { display: flex; gap: 8px; justify-content: space-between; margin-top: 4px; }
  .fix-edit-actions .left, .fix-edit-actions .right { display: flex; gap: 8px; }
  .btn-text {
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
  }
  .btn-text:hover { color: var(--text); background: var(--border); }
  .btn-text.danger { color: var(--danger); }
  .btn-text.danger:hover { color: #ff8a8a; background: rgba(229, 115, 115, 0.1); }
  .btn-primary {
    background: var(--accent);
    color: #1a1a1c;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--text-fainter);
    font-size: 14px;
    padding: 40px 20px;
  }

  /* Triage */
  .filter-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg-elevated);
    color: var(--text-faint);
    border: 0.5px solid var(--border);
    cursor: pointer;
  }
  .filter-chip:hover { color: var(--text-muted); }
  .filter-chip.on { background: var(--bg-nested); color: var(--text); border-color: var(--border-strong); }

  .triage-section { margin-bottom: 12px; }
  .triage-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--bg-elevated);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
  }
  .triage-header:hover { background: var(--bg-nested); }
  .triage-name { font-size: 14px; font-weight: 600; text-transform: capitalize; }
  .triage-name.tick { color: var(--tick); }
  .triage-name.break { color: var(--break); }
  .triage-name.tide { color: var(--tide); }
  .triage-name.course { color: var(--course); }
  .triage-name.patch { color: var(--patch); }
  .triage-name.stock { color: var(--stock); }
  .triage-name.ink { color: var(--ink); }
  .triage-name.today { color: var(--today); }
  .triage-name.crate { color: var(--crate); }
  .triage-name.cue { color: var(--cue); }
  .triage-name.none { color: var(--text-muted); }
  .triage-count { font-size: 12px; color: var(--text-faint); margin-left: 8px; font-weight: 400; }
  .triage-chev { color: var(--text-fainter); font-size: 12px; transition: transform 0.15s; }
  .triage-section.open .triage-chev { transform: rotate(90deg); }
  .triage-fixes { display: none; flex-direction: column; gap: 8px; padding: 0 2px 4px; }
  .triage-section.open .triage-fixes { display: flex; }

  /* Export */
  .export-section { margin-bottom: 20px; }
  .export-label {
    font-size: 10px;
    color: var(--text-fainter);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-left: 2px;
  }
  .preview {
    background: var(--bg);
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.55;
    white-space: pre-wrap;
    max-height: 240px;
    overflow-y: auto;
    overflow-wrap: anywhere;
  }
  .preview.empty-state {
    color: var(--text-fainter);
    font-family: inherit;
    font-size: 13px;
    text-align: center;
    padding: 24px;
  }
  .format-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
  .format-btn {
    flex: 1;
    background: var(--bg-elevated);

<script>
  // — Supabase config (shared project with the rest of the suite) —

  // ── Suite auth (Supabase email OTP, 8-digit). Shared session under the
  // supabase-js key → one sign-in across the same-origin suite. ──
  const SB_AUTH_KEY = 'sb-xsmnfcmtbpeaccnyinkr-auth-token';
  function _authSession() { try { return JSON.parse(localStorage.getItem(SB_AUTH_KEY) || 'null'); } catch (e) { return null; } }
  function _setAuthSession(x) { if (x && x.access_token) localStorage.setItem(SB_AUTH_KEY, JSON.stringify(x)); else localStorage.removeItem(SB_AUTH_KEY); }
  function hasSession() { const x = _authSession(); return !!(x && x.access_token); }
  function _sessionExpired(x) { const exp = x && x.expires_at ? x.expires_at * 1000 : 0; return Date.now() > exp - 60000; }
  // Single-flight refresh. Supabase rotates the refresh token on every use, so
  // concurrent callers (parallel boot reads, sibling suite tabs sharing this
  // session key) must share ONE round-trip — otherwise the losers present a
  // rotated token, get "Refresh Token Not Found", and wipe the session → writes
  // fall back to the anon key and die on RLS. Re-read storage first (a sibling
  // may already have a fresh token) and only clear if the dead token is still ours.
  let _refreshInFlight = null;
  function _refreshSession() {
    if (_refreshInFlight) return _refreshInFlight;
    _refreshInFlight = (async () => {
      let x = _authSession();
      if (x && x.access_token && !_sessionExpired(x)) return x;
      if (!x || !x.refresh_token) return null;
      try {
        const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, { method: 'POST', headers: { apikey: SB_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: x.refresh_token }) });
        if (!r.ok) {
          const cur = _authSession();
          if (cur && cur.access_token && !_sessionExpired(cur)) return cur;
          if (cur && cur.refresh_token === x.refresh_token) _setAuthSession(null);
          return null;
        }
        const ns = await r.json(); _setAuthSession(ns); return ns;
      } catch (e) { return null; }
    })();
    _refreshInFlight.finally(() => { _refreshInFlight = null; });
    return _refreshInFlight;
  }
  async function authToken() { let x = _authSession(); if (!x || !x.access_token) return null; if (_sessionExpired(x)) x = await _refreshSession(); return (x && x.access_token) || null; }
  async function sbBearer() { return (await authToken()) || SB_KEY; }
  async function otpSend(email) {
    const r = await fetch(`${SB_URL}/auth/v1/otp`, { method: 'POST', headers: { apikey: SB_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ email, create_user: true }) });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.msg || e.error_description || e.error || 'Could not send code'); }
  }
  async function otpVerify(email, token) {
    const r = await fetch(`${SB_URL}/auth/v1/verify`, { method: 'POST', headers: { apikey: SB_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ email, token, type: 'email' }) });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.msg || e.error_description || e.error || 'Invalid or expired code'); }
    const x = await r.json(); _setAuthSession(x); return x;
  }
  function signOut() { _setAuthSession(null); showOtpGate(); }
  function showOtpGate() {
    const gate = document.getElementById('otp-gate');
    const emailEl = document.getElementById('otp-email'), codeEl = document.getElementById('otp-code');
    const sendBtn = document.getElementById('otp-send'), verBtn = document.getElementById('otp-verify');
    const backBtn = document.getElementById('otp-back'), errEl = document.getElementById('otp-err'), msgEl = document.getElementById('otp-msg');
    const showErr = (m) => { errEl.textContent = m || ''; errEl.style.display = m ? 'block' : 'none'; };
    const toEmail = () => { codeEl.style.display = 'none'; verBtn.style.display = 'none'; backBtn.style.display = 'none'; emailEl.style.display = ''; sendBtn.style.display = ''; msgEl.textContent = "Sign in with your email. We'll send you an 8-digit code."; showErr(''); };
    toEmail(); gate.style.display = 'flex';
    sendBtn.onclick = async () => {
      const email = emailEl.value.trim(); if (!email) { showErr('Enter your email.'); return; }
      sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; showErr('');
      try { await otpSend(email); emailEl.style.display = 'none'; sendBtn.style.display = 'none'; codeEl.style.display = ''; verBtn.style.display = ''; backBtn.style.display = ''; msgEl.textContent = 'Enter the 8-digit code sent to ' + email + '.'; codeEl.value = ''; codeEl.focus(); }
      catch (e) { showErr(e.message); }
      sendBtn.disabled = false; sendBtn.textContent = 'Email me a code';
    };
    verBtn.onclick = async () => {
      const email = emailEl.value.trim(), code = codeEl.value.trim();
      if (code.length !== 8) { showErr('The code is 8 digits.'); return; }
      verBtn.disabled = true; verBtn.textContent = 'Verifying…'; showErr('');
      try { await otpVerify(email, code); gate.style.display = 'none'; startApp(); }
      catch (e) { showErr(e.message); verBtn.disabled = false; verBtn.textContent = 'Sign in'; }
    };
    backBtn.onclick = toEmail;
    codeEl.oninput = () => { codeEl.value = codeEl.value.replace(/\D/g, '').slice(0, 8); };
  }

  async function sbFetch(path, opts = {}) {
    const url = `${SB_URL}/rest/v1${path}`;
    const headers = {
      apikey: SB_KEY,
      Authorization: `Bearer ${await sbBearer()}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    };
    if (opts.method && opts.method !== 'GET') headers['Prefer'] = 'return=representation';
    const res = await fetch(url, { ...opts, headers });
    if (!res.ok) throw new Error(`Supabase ${res.status}: ${await res.text()}`);
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // — Claude (suite shared proxy) —
  // Slug `claude` — a JWT-gated server-side relay to api.anthropic.com (the
  // Anthropic billing key lives in the function's env, never in this client).
  // verify_jwt=true, so any valid suite token reaches it; we send the OTP session
  // bearer. There is NO client API key to manage or store.
  // Contract: POST { messages, system?, model?, max_tokens? } → { text, content }.
  // model allowlist incl. 'claude-haiku-4-5' / 'claude-sonnet-4-6'; max_tokens cap 4096.
  async function claudeProxy(system, input, opts = {}) {
    const { model = 'claude-sonnet-4-6', max_tokens = 1200 } = opts;
    const res = await fetch(`${SB_URL}/functions/v1/claude`, {
      method: 'POST',
      headers: {
        apikey: SB_KEY,
        Authorization: `Bearer ${await sbBearer()}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ model, max_tokens, system, messages: [{ role: 'user', content: input }] }),
    });
    if (!res.ok) throw new Error(`Claude proxy ${res.status}: ${(await res.text()).slice(0, 200)}`);
    const data = await res.json();
    return (data && data.text) || '';
  }

  // Strip ```json fences and return the first JSON object found, else null.
  function extractJSON(raw) {
    if (!raw || typeof raw !== 'string') return null;
    const s = raw.trim().replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/i, '');
    try { return JSON.parse(s); } catch (e) {}
    const m = s.match(/\{[\s\S]*\}/);
    if (!m) return null;
    try { return JSON.parse(m[0]); } catch (e) { return null; }
  }

  // — Constants —
  const APPS = ['course', 'stock', 'ink', 'tide', 'tick', 'break', 'today', 'crate', 'cue', 'patch'];
  const APP_LABEL = { course: 'Course', stock: 'Stock', ink: 'Ink', tide: 'Tide', tick: 'Tick', break: 'Break', today: 'Today', crate: 'Crate', cue: 'Cue', patch: 'Patch', all: 'All apps' };

  // Apps offered in the new-item picker. 'all' is intentionally excluded: it is a

  const CAPTURE_APPS = ['course', 'stock', 'ink', 'tide', 'break', 'today', 'crate', 'cue', 'patch'];

  const TYPES = ['bug', 'feature', 'idea'];
  const TYPE_LABEL = { bug: 'Bug', feature: 'Feature', idea: 'Idea' };
  const TYPE_DESC = { bug: 'Something is broken', feature: 'Something to build', idea: 'A thought to weigh' };
  const TAB_LABEL = { bug: 'Bugs', feature: 'Features', idea: 'Ideas' };
  const QUEUE_EMPTY = { bug: 'Nothing to fix.', feature: 'No features yet.', idea: 'No ideas yet.' };

  const STATUSES = ['open', 'in_progress', 'needs_info', 'fixed', 'shipped', 'parked'];
  const STATUS_LABEL = { open: 'Open', in_progress: 'In progress', needs_info: 'Needs info', fixed: 'Fixed', shipped: 'Shipped', parked: 'Parked' };
  const ACTIVE_STATUSES = ['open', 'in_progress', 'needs_info'];

  const SEVERITIES = ['blocker', 'annoying', 'polish'];
  const SEVERITY_LABEL = { blocker: 'Blocker', annoying: 'Annoying', polish: 'Polish' };
  const SEVERITY_ORDER = { blocker: 0, annoying: 1, polish: 2 };

  const itemType = (it) => it.type || 'bug';

  // Field definitions and per-type form layouts.
  const FIELD_DEFS = {
    app:            { kind: 'apps',     label: 'App' },
    title:          { kind: 'text',     label: 'Title',            placeholder: 'Short title' },
    where_in_app:   { kind: 'text',     label: 'Where in app',     placeholder: 'Screen / section' },
    expected:       { kind: 'textarea', label: 'Expected',         placeholder: 'What should happen' },
    actual:         { kind: 'textarea', label: 'Actual',           placeholder: 'What actually happens' },

    severity:       { kind: 'severity', label: 'Severity' },

  const FORM_FIELDS = {

    feature: ['app', 'where_in_app', 'description', 'my_guess', 'image_url'],

  // Required fields per type. App is required for bug + feature, optional for idea.

    bug:     ['app', 'where_in_app', 'expected', 'actual', 'severity'],

  };

  // — State —
  const state = {

  // — DOM helpers —
  const $ = (sel) => document.querySelector(sel);
  const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k === 'dataset') Object.assign(node.dataset, v);
      else if (k.startsWith('on')) node.addEventListener(k.slice(2), v);
      else if (k === 'html') node.innerHTML = v;
      else if (v !== null && v !== undefined) node.setAttribute(k, v);
    }
    for (const c of children) {
      if (c === null || c === undefined) continue;
      node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
    return node;
  };

  function formatTimestamp(iso) {
    const then = new Date(iso);
    const now = new Date();
    const diff = (now - then) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 86400 * 2) return 'Yesterday';
    if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}d ago`;
    return then.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

  // — Data —
  async function loadItems() {

    const row = await sbFetch('/items', { method: 'POST', body: JSON.stringify(fields) });
    const inserted = Array.isArray(row) ? row[0] : row;
    if (inserted) state.items.unshift(inserted);
    return inserted;
  }
  async function updateItem(id, fields) {
    const row = await sbFetch(`/items?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(fields) });
    const updated = Array.isArray(row) ? row[0] : row;
    if (updated) {
      const idx = state.items.findIndex((p) => p.id === id);
      if (idx >= 0) state.items[idx] = updated;
    }
    return updated;
  }
  async function deleteItem(id) {
    await sbFetch(`/items?id=eq.${id}`, { method: 'DELETE' });
    state.items = state.items.filter((p) => p.id !== id);
  }
  async function restoreItem(row) {
    const body = {};
    ['id', 'type', 'app', 'title', 'where_in_app', 'expected', 'actual', 'description',
     'severity', 'status', 'my_guess', 'device_context', 'image_url', 'repo',
     'promoted_to', 'created_at', 'fixed_at'].forEach((k) => {
      if (row[k] !== null && row[k] !== undefined) body[k] = row[k];
    });
    const restored = await sbFetch('/items', { method: 'POST', body: JSON.stringify(body) });
    const r = Array.isArray(restored) ? restored[0] : restored;
    if (r) {
      state.items.push(r);
      state.items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }
    return r;
  }
  async function itemStatusByIds(ids, status) {
    const idList = ids.map((id) => `"${id}"`).join(',');
    const fields = { status };

    await sbFetch(`/items?id=in.(${idList})`, { method: 'PATCH', body: JSON.stringify(fields) });
    state.items.forEach((p) => {
      if (ids.includes(p.id)) {
        p.status = status;
        if (fields.fixed_at !== undefined) p.fixed_at = fields.fixed_at;
      }
    });
  }

  async function handleDelete(it) {
    const snapshot = { ...it };
    try {
      await deleteItem(it.id);
    } catch (err) {
      showToast('Delete failed');
      return;
    }
    state.editingId = null;
    rerenderCurrentView();
    showToast('Item deleted', 'Undo', async () => {
      try {
        await restoreItem(snapshot);
        rerenderCurrentView();
        showToast('Restored');
      } catch (err) {
        showToast('Undo failed — item not restored');
      }
    });
  }

  // — Shared form builder (capture + edit) —
  function buildForm(container, type, values, opts = {}) {
    const onChange = opts.onChange;
    container.innerHTML = '';
    const req = new Set(REQUIRED[type]);
    FORM_FIELDS[type].forEach((key) => {
      const def = FIELD_DEFS[key];
      const group = el('div', { class: 'field' });
      group.appendChild(el('label', { class: `field-label${req.has(key) ? ' required' : ''}` }, def.label));

      if (def.kind === 'apps') {
        const row = el('div', { class: 'pills-row' });
        CAPTURE_APPS.forEach((app) => {
          row.appendChild(el('button', {
            class: `pill ${app}${values.app === app ? ' selected' : ''}`,
            type: 'button',
            dataset: { app },
            onclick: () => {
              values.app = app;
              row.querySelectorAll('.pill').forEach((p) => p.classList.toggle('selected', p.dataset.app === app));
              if (onChange) onChange();
            },
          }, APP_LABEL[app]));
        });
        group.appendChild(row);
      } else if (def.kind === 'severity') {
        const row = el('div', { class: 'pills-row' });
        SEVERITIES.forEach((s) => {
          row.appendChild(el('button', {
            class: `sev-pill ${s}${values.severity === s ? ' on' : ''}`,
            type: 'button',
            dataset: { sev: s },
            onclick: () => {
              values.severity = s;
              row.querySelectorAll('.sev-pill').forEach((p) => p.classList.toggle('on', p.dataset.sev === s));
              if (onChange) onChange();
            },
          }, SEVERITY_LABEL[s]));
        });
        group.appendChild(row);
      } else {
        const node = el(def.kind === 'textarea' ? 'textarea' : 'input', {
          class: 'field-input',
          placeholder: def.placeholder || '',
          ...(def.kind === 'textarea' ? { rows: '2' } : { type: 'text' }),
          oninput: (e) => { values[key] = e.target.value; if (onChange) onChange(); },
        });
        node.value = values[key] || '';
        group.appendChild(node);
      }
      container.appendChild(group);
    });
  }

  function formValid(type, values) {
    return REQUIRED[type].every((k) => {
      const v = values[k];
      return v !== undefined && v !== null && String(v).trim() !== '';
    });
  }

  // — Capture view —
  function renderCapture() {
    const block = $('#capture-block');
    block.innerHTML = '';
    if (state.freeform.active) renderFreeform(block);
    else if (!state.capture.type) renderTypePicker(block);
    else renderCaptureForm(block);
    renderCaptureList();
  }

  function renderTypePicker(block) {
    // Freeform entry — describe it in one box (type or dictate) and let Claude
    // sort it into a typed draft. Sits above the manual type cards.
    block.appendChild(el('button', {
      class: 'freeform-entry',
      type: 'button',
      onclick: startFreeform,
    },
      el('span', { class: 'ff-entry-name' }, '✨ Describe it'),
      el('span', { class: 'ff-entry-desc' }, 'Type or talk — Claude drafts the rest'),
    ));
    block.appendChild(el('div', { class: 'picker-or' }, 'or pick a type'));

    const wrap = el('div', { class: 'type-picker' });
    TYPES.forEach((t) => {
      wrap.appendChild(el('button', {
        class: `type-card ${t}`,
        type: 'button',
        onclick: () => startCapture(t),
      },
        el('span', { class: 'tc-name' }, TYPE_LABEL[t]),
        el('span', { class: 'tc-desc' }, TYPE_DESC[t]),
      ));
    });
    block.appendChild(wrap);
  }

  function startCapture(type) {
    state.promoteFromId = null;
    state.capture = { type, values: { app: type === 'idea' ? null : state.lastApp } };
    renderCapture();
    setTimeout(() => {
      const f = $('#capture-block').querySelector('.field-input');
      if (f) f.focus();
    }, 40);
  }

  // — Freeform capture (describe it → Claude drafts a typed item → preview) —
  function startFreeform() {
    state.promoteFromId = null;
    state.capture = { type: null, values: {} };
    state.freeform = { active: true, text: '', parsing: false };
    renderCapture();
    setTimeout(() => { const t = $('#ff-text'); if (t) t.focus(); }, 40);
  }
  function cancelFreeform() {
    stopDictation();
    state.freeform = { active: false, text: '', parsing: false };
    renderCapture();
  }

  // Web Speech API dictation. Optional — absent on some browsers, in which case
  // the mic button is hidden and the textarea still takes the OS keyboard's own
  // dictation (iOS/macOS mic key) for free.
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  let _recog = null, _recogBase = '';
  function stopDictation() { if (_recog) { try { _recog.stop(); } catch (e) {} _recog = null; } }
  function toggleDictation(btn, textEl) {
    if (_recog) { stopDictation(); btn.classList.remove('on'); btn.textContent = '🎙 Dictate'; return; }
    _recog = new SpeechRec();
    _recog.continuous = true;
    _recog.interimResults = true;
    _recog.lang = navigator.language || 'en-US';
    _recogBase = textEl.value ? textEl.value.replace(/\s*$/, '') + ' ' : '';
    _recog.onresult = (e) => {
      let txt = '';
      for (let i = 0; i < e.results.length; i++) txt += e.results[i][0].transcript;
      textEl.value = _recogBase + txt;
      state.freeform.text = textEl.value;
    };
    _recog.onerror = (e) => { showToast(e.error === 'not-allowed' ? 'Mic blocked — allow access' : 'Dictation error'); stopDictation(); btn.classList.remove('on'); btn.textContent = '🎙 Dictate'; };
    _recog.onend = () => { if (_recog) { _recog = null; btn.classList.remove('on'); btn.textContent = '🎙 Dictate'; } };
    try { _recog.start(); btn.classList.add('on'); btn.textContent = '⏹ Stop'; }
    catch (e) { _recog = null; showToast('Could not start dictation'); }
  }

  function renderFreeform(block) {
    block.appendChild(el('div', { class: 'form-head' },
      el('span', { class: 'form-title' }, 'Describe it'),
      el('button', { class: 'change-type', type: 'button', onclick: cancelFreeform }, 'Cancel'),
    ));
    block.appendChild(el('div', { class: 'form-note' },
      'Dump the bug, feature, or idea in your own words. Claude picks the type, app, and fields — you review before saving.'));

    const ta = el('textarea', {
      class: 'field-input ff-text',
      id: 'ff-text',
      rows: '5',
      placeholder: 'e.g. "In Course the triage cards don\'t show the project pillar color on mobile — should match the desktop pill"',
      oninput: (e) => { state.freeform.text = e.target.value; updateFreeformBtn(); },
    });
    ta.value = state.freeform.text || '';
    block.appendChild(ta);

    const actions = el('div', { class: 'ff-actions' });
    if (SpeechRec) {
      actions.appendChild(el('button', {
        class: 'mic-btn', type: 'button',
        onclick: (e) => toggleDictation(e.currentTarget, ta),
      }, '🎙 Dictate'));
    }
    actions.appendChild(el('button', {
      class: 'save-btn ff-format', id: 'ff-format', type: 'button', onclick: runFreeformFormat,
    }, 'Format →'));
    block.appendChild(actions);
    updateFreeformBtn();
  }
  function updateFreeformBtn() {
    const btn = $('#ff-format');
    if (btn && !state.freeform.parsing) btn.disabled = (state.freeform.text || '').trim().length < 4;
  }

  // Claude system prompt: classify + structure the freeform dump into one item.
  function freeformSystemPrompt() {
    return [
      'You convert a freeform description of a software issue into ONE structured item for a bug/feature/idea tracker.',
      'Return ONLY a JSON object (no prose, no code fences) with these keys:',
      '  "type": one of "bug" | "feature" | "idea".',
      '  "app": one of ' + CAPTURE_APPS.map((a) => `"${a}"`).join(', ') + ', or null if unclear / not app-specific.',
      '  "title": short title (REQUIRED for idea; omit otherwise).',
      '  "where_in_app": the screen/section (bug + feature).',
      '  "expected": what should happen (bug only).',
      '  "actual": what actually happens (bug only).',
      '  "severity": one of "blocker" | "annoying" | "polish" (bug only).',
      '  "description": a clear description (feature + idea).',
      '  "my_guess": an optional hunch at the cause, only if the user offered one (bug + feature).',
      '  "device_context": optional device/OS/when, only if mentioned (bug).',
      'Type rules: "bug" = something is broken; "feature" = something to build in a specific app; "idea" = a looser thought, often not tied to an app.',
      'Only include keys relevant to the chosen type. Omit keys you have no basis for — do NOT invent details. Preserve the user\'s wording where possible; tighten, don\'t embellish.',
    ].join('\n');
  }

  async function runFreeformFormat() {
    const text = (state.freeform.text || '').trim();
    if (text.length < 4 || state.freeform.parsing) return;
    stopDictation();
    state.freeform.parsing = true;
    const btn = $('#ff-format');
    if (btn) { btn.disabled = true; btn.textContent = 'Drafting…'; }
    try {
      const raw = await claudeProxy(freeformSystemPrompt(), text, { max_tokens: 1200 });
      const parsed = extractJSON(raw);
      if (!parsed || !TYPES.includes(parsed.type)) throw new Error('bad-shape');
      openDraftFromFreeform(parsed, text);
    } catch (err) {
      state.freeform.parsing = false;
      if (btn) { btn.disabled = false; btn.textContent = 'Format →'; }
      console.error('Freeform format failed:', err);
      showToast('Couldn\'t format — try again or pick a type');
    }
  }

  // Map Claude's JSON onto a capture draft and hand off to the normal capture
  // form, which IS the editable preview: same fields, validation, and save path.
  function openDraftFromFreeform(parsed, sourceText) {
    const type = parsed.type;
    const app = CAPTURE_APPS.includes(parsed.app) ? parsed.app : (type === 'idea' ? null : state.lastApp);
    const values = { app };
    FORM_FIELDS[type].forEach((k) => {
      if (k === 'app') return;
      let v = parsed[k];
      if (k === 'severity') { values[k] = SEVERITIES.includes(v) ? v : null; return; }
      values[k] = (v !== null && v !== undefined) ? String(v).trim() : '';
    });
    state.freeform = { active: false, text: sourceText, parsing: false };
    state.capture = { type, values, fromFreeform: true };
    renderCapture();
    setTimeout(() => { const f = $('#capture-block').querySelector('.field-input'); if (f) f.focus(); }, 40);
  }

  // Open the feature form prefilled from an idea; the idea is parked on save.
  function startPromote(idea) {
    state.editingId = null;
    state.promoteFromId = idea.id;
    state.capture = {
      type: 'feature',
      values: {
        app: idea.app || state.lastApp,
        where_in_app: '',
        description: idea.description || '',
        my_guess: '',
        image_url: '',
      },
    };
    go('capture');
    setTimeout(() => {
      const f = $('#capture-block').querySelector('.field-input');
      if (f) f.focus();
    }, 40);
  }

  function renderCaptureForm(block) {
    const t = state.capture.type;
    block.appendChild(el('div', { class: 'form-head' },
      el('span', { class: `form-title ${t}` }, `New ${TYPE_LABEL[t].toLowerCase()}`),
      el('button', {
        class: 'change-type',
        type: 'button',
        onclick: () => { state.capture = { type: null, values: {} }; state.promoteFromId = null; renderCapture(); },
      }, 'Change type'),
    ));

    if (state.promoteFromId) {
      block.appendChild(el('div', { class: 'form-note' }, 'Promoted from an idea — add where it lives.'));
    }

    if (state.capture.fromFreeform) {
      block.appendChild(el('div', { class: 'draft-banner' },
        el('span', {}, '✨ Drafted from your description — review and edit, then save.'),
        el('button', {
          class: 'draft-back', type: 'button',
          onclick: () => {
            state.freeform = { active: true, text: state.freeform.text || '', parsing: false };
            state.capture = { type: null, values: {} };
            renderCapture();
            setTimeout(() => { const t = $('#ff-text'); if (t) t.focus(); }, 40);
          },
        }, 'Back to text'),
      ));
    }

    const fieldsWrap = el('div', { class: 'form-fields' });
    block.appendChild(fieldsWrap);
    buildForm(fieldsWrap, t, state.capture.values, { onChange: updateCaptureSave });

    block.appendChild(el('div', { class: 'save-row' },
      el('button', { class: 'save-btn', id: 'capture-save', type: 'button', onclick: saveCapture }, 'Save'),
    ));

    // Cmd/Ctrl+Enter saves from any field.
    block.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveCapture(); }
    });

    updateCaptureSave();
  }

  function updateCaptureSave() {
    const btn = $('#capture-save');
    if (btn) btn.disabled = !formValid(state.capture.type, state.capture.values);
  }

  async function saveCapture() {
    const t = state.capture.type;
    const v = state.capture.values;
    if (!t || !formValid(t, v)) return;
    // 'all' is a filter/Export-only selector and is rejected by the items.app CHECK
    // constraint — never send it to the DB; treat it as no app (suite-wide / unfiled).
    const captureApp = (v.app && v.app !== 'all') ? v.app : null;
    const payload = { type: t, app: captureApp };
    FORM_FIELDS[t].forEach((k) => {
      if (k === 'app') return;
      const val = v[k];
      if (val !== null && val !== undefined && String(val).trim() !== '') payload[k] = String(val).trim();
    });
    const btn = $('#capture-save');
    if (btn) btn.disabled = true;
    try {
      const inserted = await createItem(payload);
      if (captureApp) { state.lastApp = captureApp; localStorage.setItem('patch_last_app', captureApp); }
      let promoted = false;
      if (state.promoteFromId && t === 'feature' && inserted) {
        try {
          await updateItem(state.promoteFromId, { status: 'parked', promoted_to: inserted.id });
          promoted = true;
        } catch (e) {
          // Feature was created; parking the source idea failed — leave the idea as-is.
        }
      }
      state.promoteFromId = null;
      state.queueTab = t;
      state.capture = { type: null, values: {} };
      renderCapture();
      if (promoted) showToast('Promoted to feature');
    } catch (err) {
      showToast('Save failed');
      if (btn) btn.disabled = false;
    }
  }

  function renderCaptureList() {
    renderQueueTabs();
    const list = $('#capture-list');
    list.innerHTML = '';
    const tab = state.queueTab;
    const items = sortQueue(state.items.filter((it) => ACTIVE_STATUSES.includes(it.status) && itemType(it) === tab), tab);
    if (!items.length) {
      list.appendChild(el('div', { class: 'empty' }, QUEUE_EMPTY[tab]));
      return;
    }
    items.slice(0, 60).forEach((it) => list.appendChild(renderItemCard(it)));
  }

  function renderQueueTabs() {
    const wrap = $('#queue-tabs');
    wrap.innerHTML = '';
    TYPES.forEach((t) => {
      const count = state.items.filter((it) => ACTIVE_STATUSES.includes(it.status) && itemType(it) === t).length;
      wrap.appendChild(el('button', {
        class: `tab ${t}${state.queueTab === t ? ' on' : ''}`,
        type: 'button',
        onclick: () => { state.queueTab = t; state.editingId = null; renderCaptureList(); },
      },
        el('span', {}, TAB_LABEL[t]),
        el('span', { class: 'tab-count' }, String(count)),
      ));
    });
  }

  // Bugs sort by severity (blocker > annoying > polish > unset) then newest first;
  // features and ideas sort newest first.
  function sortQueue(items, tab) {
    if (tab === 'bug') {
      return items.slice().sort((a, b) => {
        const sa = a.severity != null ? SEVERITY_ORDER[a.severity] : 99;
        const sb = b.severity != null ? SEVERITY_ORDER[b.severity] : 99;
        if (sa !== sb) return sa - sb;
        return new Date(b.created_at) - new Date(a.created_at);
      });
    }
    return items.slice().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  // — Item card (shared by all lists) —
  function renderItemCard(it, tsField = 'created_at') {
    if (state.editingId === it.id) return renderItemEditing(it, tsField);

    const t = itemType(it);
    const card = el('div', { class: 'fix', dataset: { id: it.id } });

    const left = el('div', { class: 'fix-left' });
    if (it.app) left.appendChild(el('span', { class: `app-tag ${it.app}` }, APP_LABEL[it.app] || it.app));
    if (t === 'feature') left.appendChild(el('span', { class: 'type-tag feature' }, 'Feature'));
    if (t === 'idea') left.appendChild(el('span', { class: 'type-tag idea' }, 'Idea'));
    if (t === 'bug' && it.severity) left.appendChild(el('span', { class: `sev-chip ${it.severity}` }, SEVERITY_LABEL[it.severity]));

    card.appendChild(el('div', { class: 'fix-top' },
      left,
      el('span', { class: `status-chip ${it.status}` }, STATUS_LABEL[it.status] || it.status),
    ));

    card.appendChild(el('div', { class: `fix-text${it.status === 'parked' ? ' parked' : ''}` }, displayTitle(it)));
    const sub = cardSubline(it);
    if (sub) card.appendChild(el('div', { class: 'fix-sub' }, sub));
    card.appendChild(el('div', { class: 'fix-ts' }, formatTimestamp(it[tsField] || it.created_at)));

    card.addEventListener('click', () => { state.editingId = it.id; rerenderCurrentView(); });
    return card;
  }

  function renderItemEditing(it, tsField = 'created_at') {
    const card = el('div', { class: 'fix editing', dataset: { id: it.id } });
    const draft = { type: itemType(it), app: it.app || null };
    CONTENT_FIELDS.forEach((k) => { draft[k] = it[k] != null ? it[k] : (k === 'severity' ? null : ''); });

    card.appendChild(el('div', { class: 'fix-top' },
      el('span', { class: 'fix-ts' }, formatTimestamp(it[tsField] || it.created_at)),
    ));

    const saveBtn = el('button', { class: 'btn-primary', type: 'button' }, 'Save');
    const updateBtn = () => { saveBtn.disabled = !formValid(draft.type, draft); };

    const fieldsWrap = el('div', { class: 'form-fields' });

    const typeRow = el('div', { class: 'type-row' });
    TYPES.forEach((t) => {
      typeRow.appendChild(el('button', {
        class: `type-pill ${t}${draft.type === t ? ' on' : ''}`,
        type: 'button',
        dataset: { type: t },
        onclick: () => {
          draft.type = t;
          typeRow.querySelectorAll('.type-pill').forEach((b) => b.classList.toggle('on', b.dataset.type === t));
          buildForm(fieldsWrap, t, draft, { onChange: updateBtn });
          updateBtn();
        },
      }, TYPE_LABEL[t]));
    });
    card.appendChild(typeRow);

    card.appendChild(fieldsWrap);
    buildForm(fieldsWrap, draft.type, draft, { onChange: updateBtn });

    card.appendChild(el('div', { class: 'field-label' }, 'Status'));
    const statusRow = el('div', { class: 'fix-edit-status' });
    let currentStatus = it.status;
    STATUSES.forEach((s) => {
      statusRow.appendChild(el('button', {
        class: `status-pick ${s}${currentStatus === s ? ' on' : ''}`,
        type: 'button',
        dataset: { status: s },
        onclick: () => {
          currentStatus = s;
          statusRow.querySelectorAll('.status-pick').forEach((b) => b.classList.toggle('on', b.dataset.status === s));
        },
      }, STATUS_LABEL[s]));
    });
    card.appendChild(statusRow);

    saveBtn.addEventListener('click', async () => {
      if (!formValid(draft.type, draft)) { showToast('Fill required fields'); return; }
      const norm = (v) => (v === '' || v == null) ? null : v;
      const fields = {};
      if (draft.type !== itemType(it)) fields.type = draft.type;
      const newApp = draft.app || null;
      if (newApp !== (it.app || null)) fields.app = newApp;
      // Only touch fields belonging to the (possibly new) type — leaves orphan
      // fields from a prior type untouched rather than dropping data.
      FORM_FIELDS[draft.type].forEach((k) => {
        if (k === 'app') return;
        const newV = norm(draft[k]);
        const oldV = norm(it[k]);
        if (newV !== oldV) fields[k] = newV;
      });
      if (currentStatus !== it.status) {
        fields.status = currentStatus;
        if (currentStatus === 'fixed' || currentStatus === 'shipped') fields.fixed_at = new Date().toISOString();
        else if (it.status === 'fixed' || it.status === 'shipped') fields.fixed_at = null;
      }
      if (Object.keys(fields).length === 0) { state.editingId = null; rerenderCurrentView(); return; }
      try {
        await updateItem(it.id, fields);
        state.editingId = null;
        rerenderCurrentView();
      } catch (err) {
        showToast('Save failed');
      }
    });

    const leftActions = el('div', { class: 'left' },
      el('button', { class: 'btn-text danger', type: 'button', onclick: () => handleDelete(it) }, 'Delete'),
    );
    if (itemType(it) === 'idea') {
      leftActions.appendChild(el('button', {
        class: 'btn-text', type: 'button',
        onclick: () => startPromote(it),
      }, 'Promote to feature'));
    }
    card.appendChild(el('div', { class: 'fix-edit-actions' },
      leftActions,
      el('div', { class: 'right' },
        el('button', {
          class: 'btn-text', type: 'button',
          onclick: () => { state.editingId = null; rerenderCurrentView(); },
        }, 'Cancel'),
        saveBtn,
      ),
    ));

    updateBtn();
    setTimeout(() => { const f = fieldsWrap.querySelector('.field-input'); if (f) f.focus(); }, 20);
    return card;
  }

  function rerenderCurrentView() {
    if (state.view === 'capture') renderCaptureList();
    if (state.view === 'triage') renderTriage();
    if (state.view === 'history') renderHistory();
  }

  // — Triage view —
  function renderTriage() {
    const filters = $('#triage-filters');
    filters.innerHTML = '';
    STATUSES.forEach((s) => {
      filters.appendChild(el('button', {
        class: `filter-chip${state.triageFilters.has(s) ? ' on' : ''}`,
        onclick: () => {
          if (state.triageFilters.has(s)) state.triageFilters.delete(s);
          else state.triageFilters.add(s);
          renderTriage();
        },
      }, STATUS_LABEL[s]));
    });

    const body = $('#triage-body');
    body.innerHTML = '';

    const groups = {};
    APPS.forEach((a) => { groups[a] = newGroup(); });
    groups.all = newGroup();
    groups.none = newGroup();
    state.items.forEach((it) => {
      const key = it.app && groups[it.app] ? it.app : 'none';
      groups[key].counts[it.status] = (groups[key].counts[it.status] || 0) + 1;
      groups[key].total++;
      if (state.triageFilters.has(it.status)) groups[key].fixes.push(it);
    });

    const order = APPS.slice();
    if (groups.all.total) order.push('all');
    if (groups.none.total) order.push('none');
    const sorted = order.sort((a, b) => {
      const ao = activeCount(groups[a]);
      const bo = activeCount(groups[b]);
      if (bo !== ao) return bo - ao;
      return order.indexOf(a) - order.indexOf(b);
    });

    sorted.forEach((app) => {
      const g = groups[app];
      const section = el('div', { class: `triage-section${state.triageOpenSections.has(app) ? ' open' : ''}` });
      const header = el('div', {
        class: 'triage-header',
        onclick: () => {
          if (state.triageOpenSections.has(app)) state.triageOpenSections.delete(app);
          else state.triageOpenSections.add(app);
          renderTriage();
        },
      },
        el('div', {},
          el('span', { class: `triage-name ${app}` }, app === 'none' ? 'Unfiled' : APP_LABEL[app]),
          el('span', { class: 'triage-count' }, summaryText(g)),
        ),
        el('span', { class: 'triage-chev' }, '▸'),
      );
      section.appendChild(header);

      const fixesWrap = el('div', { class: 'triage-fixes' });
      if (g.fixes.length === 0) {
        fixesWrap.appendChild(el('div', { class: 'empty' }, 'Nothing matching the filter.'));
      } else {
        g.fixes.forEach((it) => fixesWrap.appendChild(renderItemCard(it)));
      }
      section.appendChild(fixesWrap);
      body.appendChild(section);
    });
  }

  function newGroup() { return { counts: {}, total: 0, fixes: [] }; }
  function activeCount(g) { return ACTIVE_STATUSES.reduce((n, s) => n + (g.counts[s] || 0), 0); }
  function summaryText(g) {
    const parts = [];
    if (g.counts.open) parts.push(`${g.counts.open} open`);
    if (g.counts.in_progress) parts.push(`${g.counts.in_progress} in progress`);
    if (g.counts.needs_info) parts.push(`${g.counts.needs_info} needs info`);
    if (parts.length) return parts.join(' · ');
    if (g.total === 0) return '0';
    const closed = (g.counts.fixed || 0) + (g.counts.shipped || 0) + (g.counts.parked || 0);
    return closed ? `${closed} closed` : '0';
  }

  // — History view —
  function renderHistory() {
    const body = $('#history-body');
    body.innerHTML = '';
    const rows = state.items.slice().sort((a, b) =>
      new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at)
    );
    if (!rows.length) {
      body.appendChild(el('div', { class: 'empty' }, 'No activity yet.'));
      return;
    }
    rows.slice(0, 100).forEach((it) => body.appendChild(renderItemCard(it, 'updated_at')));
  }

  // — Export view —
  function renderExport() {
    if (!state.exportApp) state.exportApp = state.lastApp;

    const pills = $('#export-pills');
    pills.innerHTML = '';
    [...APPS, 'all'].forEach((app) => {
      pills.appendChild(el('button', {
        class: `pill ${app}${state.exportApp === app ? ' selected' : ''}`,
        onclick: () => { state.exportApp = app; renderExport(); },
      }, app === 'all' ? 'All' : APP_LABEL[app]));
    });

    const filters = $('#export-filters');
    filters.innerHTML = '';
    STATUSES.forEach((s) => {
      filters.appendChild(el('button', {
        class: `filter-chip${state.exportFilters.has(s) ? ' on' : ''}`,
        onclick: () => {
          if (state.exportFilters.has(s)) state.exportFilters.delete(s);
          else state.exportFilters.add(s);
          renderExport();
        },
      }, STATUS_LABEL[s]));
    });

    document.querySelectorAll('.format-btn').forEach((b) => {
      b.classList.toggle('on', b.dataset.format === state.exportFormat);
      b.onclick = () => { state.exportFormat = b.dataset.format; renderExport(); };
    });

    const matches = exportMatches();
    const preview = $('#export-preview');
    preview.classList.remove('empty-state');
    if (!matches.length) {
      preview.classList.add('empty-state');
      preview.textContent = 'No matching items.';
    } else {
      preview.textContent = buildExportText(matches);
    }
    $('#export-copy').disabled = !matches.length;

    const bulk = $('#export-mark-bulk');
    const hasOpen = matches.some((p) => p.status === 'open');
    const hasInProgress = matches.some((p) => p.status === 'in_progress');
    if (hasOpen) {
      bulk.textContent = 'Mark all as In progress';
      bulk.dataset.mode = 'in_progress';
      bulk.disabled = false;
    } else if (hasInProgress) {
      bulk.textContent = 'Mark all as Fixed';
      bulk.dataset.mode = 'fixed';
      bulk.disabled = false;
    } else {
      bulk.textContent = 'Mark all as In progress';
      bulk.dataset.mode = 'in_progress';
      bulk.disabled = true;
    }
  }

  function exportMatches() {
    return state.items
      .filter((p) => (state.exportApp === 'all' || p.app === state.exportApp) && state.exportFilters.has(p.status))
      .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  }

  // Bare line — used by the plain-list format (deliberately context-free).
  function exportLine(it) {
    const t = itemType(it);
    if (t === 'bug') {
      if (it.expected || it.actual) {
        const where = it.where_in_app ? `${it.where_in_app}: ` : '';
        return `${where}expected ${it.expected || '?'} — got ${it.actual || '?'}`;
      }
      return displayTitle(it);
    }
    if (t === 'feature') {
      const where = it.where_in_app ? `${it.where_in_app}: ` : '';
      return `${where}${it.description || it.title || '(feature)'}`;
    }
    return it.title
      ? (it.description ? `${it.title} — ${it.description}` : it.title)
      : (it.description || '(idea)');
  }

  // Richer line for the Claude Code prompt: bugs lead with a severity tag and
  // both bugs + features append the user's guess at the cause when present, so
  // the context typed at capture actually reaches the handoff.
  function exportLinePrompt(it) {
    const t = itemType(it);
    const guess = it.my_guess && it.my_guess.trim() ? ` (my guess: ${it.my_guess.trim()})` : '';
    if (t === 'bug') {
      const sev = it.severity ? `[${SEVERITY_LABEL[it.severity]}] ` : '';
      return `${sev}${exportLine(it)}${guess}`;
    }
    if (t === 'feature') {
      return `${exportLine(it)}${guess}`;
    }
    return exportLine(it);
  }

  // Numbered list; splits into type-labeled groups only when more than one type is present.
  function promptGroup(items) {
    const present = TYPES.filter((t) => items.some((it) => itemType(it) === t));
    if (present.length <= 1) {
      return items.map((it, i) => `${i + 1}. ${exportLinePrompt(it)}`).join('\n');
    }
    const labels = { bug: 'Bugs', feature: 'Features', idea: 'Ideas' };
    const blocks = [];
    present.forEach((t) => {
      const group = items.filter((it) => itemType(it) === t);
      const lines = [`${labels[t]} (${group.length}):`];
      group.forEach((it, i) => lines.push(`${i + 1}. ${exportLinePrompt(it)}`));
      blocks.push(lines.join('\n'));
    });
    return blocks.join('\n\n');
  }

  function buildExportText(matches) {
    if (state.exportFormat === 'plain') {
      return matches.map((it) => `- ${exportLine(it)}`).join('\n');
    }
    const onlyOpen = state.exportFilters.size === 1 && state.exportFilters.has('open');
    const lead = onlyOpen ? 'Open items' : 'Items';

    if (state.exportApp === 'all') {
      const blocks = [];
      [...APPS, 'all', 'none'].forEach((app) => {
        const items = matches.filter((p) => (app === 'none' ? !p.app : p.app === app));
        if (items.length) {
          const heading = app === 'none' ? 'Unfiled' : APP_LABEL[app];
          blocks.push(`### ${heading} (${items.length})\n${promptGroup(items)}`);
        }
      });
      return [
        `${lead} across the suite (${matches.length}):`,
        '',
        blocks.join('\n\n'),
        '',
        "Review each, propose changes to the relevant app's spec, then implement.",
      ].join('\n');
    }

    const app = state.exportApp;
    const header = `${lead} for ${APP_LABEL[app]} (${matches.length}):`;
    const closing = `Review each, propose changes to ${app}-spec.md, then implement.`;
    return [header, '', promptGroup(matches), '', closing].join('\n');
  }

  $('#export-copy').addEventListener('click', async () => {
    const matches = exportMatches();
    if (!matches.length) return;
    const text = buildExportText(matches);
    const label = `Copied — ${matches.length} ${matches.length === 1 ? 'item' : 'items'}`;
    try {
      await navigator.clipboard.writeText(text);
      showToast(label);
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(label);
    }
  });

  $('#export-mark-bulk').addEventListener('click', async () => {
    const mode = $('#export-mark-bulk').dataset.mode || 'in_progress';
    const fromStatus = mode === 'fixed' ? 'in_progress' : 'open';
    const toStatus = mode === 'fixed' ? 'fixed' : 'in_progress';
    const ids = state.items
      .filter((p) => (state.exportApp === 'all' || p.app === state.exportApp) && p.status === fromStatus)
      .map((p) => p.id);
    if (!ids.length) return;
    try {
      await itemStatusByIds(ids, toStatus);
      renderExport();
      showToast(`Marked ${ids.length} as ${STATUS_LABEL[toStatus]}`, 'Undo', async () => {
        try {
          await itemStatusByIds(ids, fromStatus);
          renderExport();
          showToast(`Reverted ${ids.length} to ${STATUS_LABEL[fromStatus]}`);
        } catch (err) {
          showToast('Undo failed');
        }
      });
    } catch (err) {
      showToast('Update failed');
    }
  });

  // — Init — (gated on Supabase auth)
  async function startApp() {
    document.getElementById('otp-gate').style.display = 'none';
    await loadItems();
    go('capture');
  }
  (function init() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
    if (hasSession()) startApp(); else showOtpGate();
  })();
</script>
</body>
</html>
